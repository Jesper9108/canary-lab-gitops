apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: task-service
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Jesper9108/canary-lab-gitops.git
    targetRevision: main
    path: app
  destination:
    server: https://kubernetes.default.svc
    namespace: app
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
